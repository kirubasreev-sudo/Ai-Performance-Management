<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Performance Management System</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #fafaf9; --bg2: #f4f3f0; --bg3: #fff;
    --text: #1a1a18; --text2: #5f5e5a; --text3: #888780;
    --border: rgba(0,0,0,0.1); --border2: rgba(0,0,0,0.18);
    --green: #1D9E75; --green-bg: #E1F5EE; --green-text: #085041;
    --blue-bg: #E6F1FB; --blue-text: #185FA5;
    --amber-bg: #FAEEDA; --amber-text: #854F0B;
    --red-bg: #FCEBEB; --red-text: #A32D2D;
    --radius: 8px; --radius-lg: 12px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  body { background: var(--bg); color: var(--text); min-height: 100vh; }
  .shell { max-width: 1000px; margin: 0 auto; padding: 2rem 1.5rem; }
  .top-bar { margin-bottom: 2rem; }
  .top-bar h1 { font-size: 22px; font-weight: 600; margin-bottom: 4px; }
  .top-bar p { font-size: 14px; color: var(--text2); }
  .nav { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 1.5rem; border-bottom: 1px solid var(--border); padding-bottom: 1rem; }
  .nav-btn { padding: 7px 16px; border-radius: var(--radius); border: 1px solid var(--border); background: transparent; cursor: pointer; font-size: 13px; color: var(--text2); transition: all 0.15s; }
  .nav-btn.active { background: var(--text); color: #fff; border-color: var(--text); font-weight: 500; }
  .nav-btn:hover:not(.active) { background: var(--bg2); }
  .sh { margin-bottom: 1.25rem; }
  .sh h2 { font-size: 17px; font-weight: 600; margin-bottom: 3px; }
  .sh p { font-size: 13px; color: var(--text2); }
  .card { background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1.1rem 1.3rem; margin-bottom: 1rem; }
  .grid4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 1rem; }
  @media (max-width: 700px) { .grid4 { grid-template-columns: repeat(2, 1fr); } }
  .metric { background: var(--bg2); border-radius: var(--radius); padding: 1rem; }
  .metric-label { font-size: 12px; color: var(--text2); margin-bottom: 4px; }
  .metric-value { font-size: 26px; font-weight: 600; }
  .metric-sub { font-size: 11px; color: var(--text3); margin-top: 2px; }
  .badge { display: inline-block; font-size: 11px; padding: 3px 9px; border-radius: var(--radius); font-weight: 500; }
  .bs { background: var(--green-bg); color: var(--green-text); }
  .bi { background: var(--blue-bg); color: var(--blue-text); }
  .bw { background: var(--amber-bg); color: var(--amber-text); }
  .bd { background: var(--red-bg); color: var(--red-text); }
  .emp-row { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--border); }
  .emp-row:last-child { border-bottom: none; }
  .avatar { width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; flex-shrink: 0; }
  .bar { height: 6px; background: var(--border); border-radius: 99px; overflow: hidden; margin-top: 5px; }
  .bar-fill { height: 100%; border-radius: 99px; background: var(--green); transition: width 0.4s; }
  .crit-row { display: flex; align-items: center; gap: 8px; padding: 6px 0; font-size: 13px; }
  label { font-size: 13px; color: var(--text2); display: block; margin-bottom: 4px; margin-top: 10px; }
  label:first-child { margin-top: 0; }
  input[type=text], textarea, select { width: 100%; padding: 8px 12px; border: 1px solid var(--border2); border-radius: var(--radius); font-size: 14px; background: var(--bg3); color: var(--text); font-family: inherit; outline: none; }
  input[type=text]:focus, textarea:focus, select:focus { border-color: #888; }
  textarea { min-height: 80px; resize: vertical; }
  .btn { padding: 8px 16px; border-radius: var(--radius); border: 1px solid var(--border2); background: transparent; cursor: pointer; font-size: 13px; color: var(--text); transition: all 0.15s; font-family: inherit; }
  .btn:hover { background: var(--bg2); }
  .btn-p { background: var(--text); color: #fff; border-color: transparent; }
  .btn-p:hover { opacity: 0.85; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .divider { border: none; border-top: 1px solid var(--border); margin: 1rem 0; }
  .fb-item { padding: 10px; background: var(--bg2); border-radius: var(--radius); margin-bottom: 8px; font-size: 13px; line-height: 1.5; }
  .fb-src { font-size: 11px; color: var(--text3); margin-bottom: 3px; }
  .warn-box { background: var(--amber-bg); border-radius: var(--radius); padding: 10px 14px; font-size: 13px; color: var(--amber-text); margin-bottom: 12px; }
  .tag { display: inline-block; font-size: 11px; padding: 2px 7px; border-radius: var(--radius); border: 1px solid var(--border); color: var(--text2); }
  .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 3px; }
  .goal-item { padding: 9px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
  .goal-item:last-child { border-bottom: none; }
  .ai-out { background: var(--bg2); border-radius: var(--radius); padding: 1rem; font-size: 13px; line-height: 1.75; white-space: pre-wrap; max-height: 450px; overflow-y: auto; margin-top: 12px; border: 1px solid var(--border); }
  .spin { display: inline-block; width: 13px; height: 13px; border: 2px solid var(--border); border-top-color: var(--text2); border-radius: 50%; animation: sp 0.7s linear infinite; vertical-align: middle; }
  @keyframes sp { to { transform: rotate(360deg); } }
  .emp-sel { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
  .section-desc { font-size: 12px; color: var(--text3); margin-top: 8px; }
  .check-row { display: flex; gap: 10px; padding: 7px 0; border-bottom: 1px solid var(--border); }
  .check-row:last-child { border-bottom: none; }
  .check-row .info div:first-child { font-size: 13px; font-weight: 500; margin-bottom: 2px; }
  .check-row .info div:last-child { font-size: 12px; color: var(--text2); }
  .flex-gap { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .tab-content { animation: fadeIn 0.15s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
  .score-big { font-size: 26px; font-weight: 600; }
  .err-msg { color: var(--red-text); font-size: 13px; margin-top: 8px; }
  .btns-row { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
</style>
</head>
<body>
<div class="shell">
  <div class="top-bar">
    <h1>Performance Management System</h1>
    <p>AI-powered evaluations · 360° feedback · Bias mitigation · Goal tracking</p>
  </div>
  <nav class="nav" id="nav"></nav>
  <div class="tab-content" id="content"></div>
</div>

<script>
const EMPS = [
  {id:1,name:"Arjun Mehta",role:"Senior Engineer",dept:"Engineering",ini:"AM",bg:"#B5D4F4",tc:"#0C447C"},
  {id:2,name:"Priya Sharma",role:"Product Manager",dept:"Product",ini:"PS",bg:"#9FE1CB",tc:"#085041"},
  {id:3,name:"Rahul Iyer",role:"Data Analyst",dept:"Analytics",ini:"RI",bg:"#F5C4B3",tc:"#712B13"},
  {id:4,name:"Kavya Nair",role:"UX Designer",dept:"Design",ini:"KN",bg:"#CECBF6",tc:"#3C3489"},
];
const CRIT = [
  {k:"technical",l:"Technical skills",w:25},
  {k:"communication",l:"Communication",w:20},
  {k:"collaboration",l:"Collaboration",w:20},
  {k:"initiative",l:"Initiative & ownership",w:20},
  {k:"delivery",l:"Delivery & results",w:15},
];
const FB = {
  1:[{src:"Manager",txt:"Delivers complex features on time. Excellent system design skills.",stars:4},{src:"Peer — Priya",txt:"Excellent pair programming partner, always helpful.",stars:5},{src:"Peer — Kavya",txt:"Communicates well in cross-functional meetings.",stars:4},{src:"Self",txt:"Improved code review practices. Want to grow in leadership.",stars:4}],
  2:[{src:"Manager",txt:"Drives product vision well. Stakeholder alignment could improve.",stars:4},{src:"Peer — Arjun",txt:"Clear specs that make engineering's job easier.",stars:5},{src:"Peer — Rahul",txt:"Decisions sometimes lack sufficient data backing.",stars:3},{src:"Self",txt:"Strong roadmap quarter. Want to improve metrics-driven decisions.",stars:4}],
  3:[{src:"Manager",txt:"High-quality analyses. Should communicate insights more proactively.",stars:3},{src:"Peer — Priya",txt:"Dashboards are always well-structured and useful.",stars:4},{src:"Peer — Kavya",txt:"Quiet in meetings but work quality is excellent.",stars:4},{src:"Self",txt:"Delivered all key reports. Building data storytelling skills.",stars:3}],
  4:[{src:"Manager",txt:"User-centric designs. Leadership presence in design reviews is growing.",stars:4},{src:"Peer — Arjun",txt:"Great at translating complex requirements into clean UI.",stars:5},{src:"Peer — Priya",txt:"Proactive in proposing new design concepts.",stars:5},{src:"Self",txt:"Best quarter for user research. Strengthening design system contributions.",stars:4}],
};
const SC = {
  1:{technical:4.5,communication:4.0,collaboration:4.8,initiative:4.2,delivery:4.6},
  2:{technical:3.8,communication:4.2,collaboration:4.5,initiative:4.6,delivery:4.1},
  3:{technical:4.3,communication:3.5,collaboration:3.8,initiative:3.6,delivery:4.2},
  4:{technical:4.4,communication:4.3,collaboration:4.7,initiative:4.8,delivery:4.3},
};
const BF = {
  1:[],
  2:["Recency bias detected — review may over-weight last sprint performance"],
  3:["Halo effect detected — strong technical scores may inflate other criteria"],
  4:[],
};
const BIAS_CHECKS = [
  ["Demographic language scan","Removes gender, age, ethnicity-coded language","green"],
  ["Recency bias normalization","Weights the full review period equally","green"],
  ["Halo/horn effect detection","Prevents outlier scores from skewing the overall rating","green"],
  ["Consistency calibration","Same criteria applied uniformly across all employees","green"],
  ["Anchoring bias control","Reviews scored independently before peer comparison","amber"],
];

function ws(id){const s=SC[id];return(s.technical*.25+s.communication*.2+s.collaboration*.2+s.initiative*.2+s.delivery*.15).toFixed(2);}
function rl(score){if(score>=4.5)return["Exceptional","bs"];if(score>=4.0)return["Exceeds expectations","bi"];if(score>=3.5)return["Meets expectations","bw"];return["Needs improvement","bd"];}
function stars(n){return"★".repeat(n)+"☆".repeat(5-n);}
function empBtns(sel,attr){return EMPS.map(e=>`<button class="btn${e.id===sel?" btn-p":""}" ${attr}="${e.id}">${e.name}</button>`).join("");}
function avgTeam(k){return(EMPS.reduce((a,e)=>a+SC[e.id][k],0)/EMPS.length).toFixed(1);}

const ST = {
  tab:"dashboard",selEval:EMPS[0],selRev:EMPS[0],selGoal:EMPS[0],
  gen:false,aiOut:"",aiCtx:"",aiErr:"",
  fbTxt:"",fbSrc:"Manager",fbEid:1,
  newGoal:"",
  goals:[
    {eid:1,title:"Lead Q3 platform migration architecture review",due:"Sep 2026",status:"In progress"},
    {eid:1,title:"Complete AWS Solutions Architect certification",due:"Jun 2026",status:"Planned"},
    {eid:2,title:"Define and track 3 north-star product metrics",due:"Jul 2026",status:"In progress"},
    {eid:4,title:"Publish 5 reusable design system components",due:"Aug 2026",status:"Planned"},
  ],
};

const TABS = [
  {id:"dashboard",label:"Dashboard"},
  {id:"evaluations",label:"Evaluations"},
  {id:"feedback",label:"360° Feedback"},
  {id:"reviews",label:"AI Reviews"},
  {id:"goals",label:"Goals & Dev"},
  {id:"settings",label:"Criteria"},
];

function renderNav(){
  document.getElementById("nav").innerHTML = TABS.map(t=>`<button class="nav-btn${ST.tab===t.id?" active":""}" data-tab="${t.id}">${t.label}</button>`).join("");
  document.querySelectorAll("[data-tab]").forEach(b=>b.onclick=()=>{ST.tab=b.dataset.tab;ST.aiOut="";ST.aiErr="";ST.aiCtx="";render();});
}

function render(){
  renderNav();
  const fn={dashboard:bDash,evaluations:bEval,feedback:bFeedback,reviews:bReviews,goals:bGoals,settings:bSettings};
  document.getElementById("content").innerHTML=fn[ST.tab]();
  bindAll();
}

function bDash(){
  const scores=EMPS.map(e=>parseFloat(ws(e.id)));
  const avg=(scores.reduce((a,b)=>a+b,0)/scores.length).toFixed(2);
  const above=scores.filter(s=>s>=4.0).length;
  return `<div class="sh"><h2>Performance overview — Q2 2026</h2><p>Aggregated results · ${EMPS.length} employees · 5 standardized criteria · 360° multi-source feedback</p></div>
  <div class="grid4">
    <div class="metric"><div class="metric-label">Team average score</div><div class="metric-value">${avg}<span style="font-size:15px;color:var(--text2)">/5</span></div><div class="metric-sub">Weighted across all criteria</div></div>
    <div class="metric"><div class="metric-label">Exceeding expectations</div><div class="metric-value">${above}<span style="font-size:15px;color:var(--text2)"> of 4</span></div><div class="metric-sub">Score ≥ 4.0</div></div>
    <div class="metric"><div class="metric-label">Reviews generated</div><div class="metric-value">4<span style="font-size:15px;color:var(--text2)"> AI</span></div><div class="metric-sub">Bias-checked & standardized</div></div>
    <div class="metric"><div class="metric-label">Bias flags raised</div><div class="metric-value">2<span style="font-size:15px;color:var(--text2)"> flags</span></div><div class="metric-sub">Compensated in AI reviews</div></div>
  </div>
  <div class="card">
    <div style="font-size:14px;font-weight:600;margin-bottom:12px">Employee performance summary</div>
    ${EMPS.map(e=>{const score=ws(e.id);const lr=rl(parseFloat(score));const pct=(parseFloat(score)/5*100).toFixed(0);return`<div class="emp-row"><div class="avatar" style="background:${e.bg};color:${e.tc}">${e.ini}</div><div style="flex:1"><div style="font-size:13px;font-weight:600">${e.name}</div><div style="font-size:12px;color:var(--text2)">${e.role} · ${e.dept}</div><div class="bar"><div class="bar-fill" style="width:${pct}%"></div></div></div><div style="text-align:right;flex-shrink:0;margin-left:12px"><div class="score-big" style="font-size:20px">${score}</div><span class="badge ${lr[1]}">${lr[0]}</span></div></div>`;}).join("")}
  </div>
  <div class="card">
    <div style="font-size:14px;font-weight:600;margin-bottom:12px">Criteria averages — team</div>
    ${CRIT.map(c=>{const a=avgTeam(c.k);const pct=(parseFloat(a)/5*100).toFixed(0);return`<div class="crit-row"><span style="flex:1">${c.l}</span><div style="flex:2;display:flex;align-items:center;gap:8px"><div class="bar" style="flex:1;margin:0"><div class="bar-fill" style="width:${pct}%"></div></div><span style="font-size:13px;font-weight:600;width:30px">${a}</span></div><span class="tag">${c.w}%</span></div>`;}).join("")}
  </div>`;
}

function bEval(){
  const e=ST.selEval;
  return `<div class="sh"><h2>Individual evaluations</h2><p>Standardized per-employee scores with bias detection</p></div>
  <div class="emp-sel">${empBtns(e.id,"data-ee")}</div>
  ${BF[e.id].length?`<div class="warn-box">⚠ ${BF[e.id][0]}</div>`:""}
  <div class="card">
    <div style="display:flex;align-items:center;gap:14px;margin-bottom:14px">
      <div class="avatar" style="background:${e.bg};color:${e.tc};width:46px;height:46px;font-size:14px">${e.ini}</div>
      <div><div style="font-weight:600;font-size:16px">${e.name}</div><div style="font-size:13px;color:var(--text2)">${e.role} · ${e.dept}</div></div>
      <div style="margin-left:auto;text-align:right"><div class="score-big">${ws(e.id)}</div><span class="badge ${rl(parseFloat(ws(e.id)))[1]}">${rl(parseFloat(ws(e.id)))[0]}</span></div>
    </div>
    <div class="divider"></div>
    ${CRIT.map(c=>{const s=SC[e.id][c.k];const pct=(s/5*100).toFixed(0);return`<div class="crit-row"><span style="flex:1">${c.l}</span><div style="flex:2;display:flex;align-items:center;gap:8px"><div class="bar" style="flex:1;margin:0"><div class="bar-fill" style="width:${pct}%"></div></div><span style="font-size:13px;font-weight:600;width:30px">${s}</span></div><span class="tag">${c.w}%</span></div>`;}).join("")}
  </div>
  <div class="card">
    <div style="font-size:13px;font-weight:600;margin-bottom:10px">360° Feedback received</div>
    ${FB[e.id].map(f=>`<div class="fb-item"><div class="fb-src">${f.src} · ${stars(f.stars)}</div><div>${f.txt}</div></div>`).join("")}
  </div>`;
}

function bFeedback(){
  return `<div class="sh"><h2>360° feedback aggregation</h2><p>Submit peer, manager, and self feedback from multiple sources</p></div>
  <div class="card">
    <label>Employee</label>
    <select id="fb-emp">${EMPS.map(e=>`<option value="${e.id}"${ST.fbEid===e.id?" selected":""}>${e.name} — ${e.role}</option>`).join("")}</select>
    <label>Source type</label>
    <select id="fb-src">${["Manager","Peer","Self","Skip-level"].map(s=>`<option${ST.fbSrc===s?" selected":""}>${s}</option>`).join("")}</select>
    <label>Feedback</label>
    <textarea id="fb-txt" placeholder="Describe specific observations, behaviours, and measurable impact...">${ST.fbTxt}</textarea>
    <div class="btns-row">
      <button class="btn btn-p" id="fb-sub">Submit feedback</button>
      <button class="btn" id="fb-ai">Improve with AI ↗</button>
    </div>
    ${ST.aiOut&&ST.aiCtx==="feedback"?`<div class="ai-out">${ST.aiOut}</div>`:""}
    ${ST.aiErr&&ST.aiCtx==="feedback"?`<div class="err-msg">${ST.aiErr}</div>`:""}
  </div>
  <div class="card">
    <div style="font-size:13px;font-weight:600;margin-bottom:10px">Feedback coverage — all employees</div>
    ${EMPS.map(e=>`<div class="emp-row"><div class="avatar" style="background:${e.bg};color:${e.tc}">${e.ini}</div><div style="flex:1"><div style="font-size:13px;font-weight:600">${e.name}</div><div style="display:flex;gap:4px;margin-top:5px;flex-wrap:wrap">${["Manager","Peer","Self"].map(s=>`<span class="badge bs">${s} ✓</span>`).join("")}</div></div><span class="badge bs">${FB[e.id].length} inputs</span></div>`).join("")}
  </div>`;
}

function bReviews(){
  const e=ST.selRev;
  return `<div class="sh"><h2>AI performance review generator</h2><p>Standardized, bias-mitigated reviews from aggregated data using AI</p></div>
  <div class="card">
    <label>Select employee</label>
    <div class="emp-sel">${empBtns(e.id,"data-re")}</div>
    ${BF[e.id].length?`<div class="warn-box">⚠ ${BF[e.id][0]} — AI will actively compensate.</div>`:""}
    <div class="flex-gap">
      <button class="btn btn-p" id="gen-btn"${ST.gen?" disabled":""}>${ST.gen?'<span class="spin"></span> Generating review…':'Generate review ↗'}</button>
      <span style="font-size:12px;color:var(--text3)">Draws on all scores, feedback, and bias checks</span>
    </div>
    ${ST.aiOut&&ST.aiCtx==="review"?`<div class="ai-out">${ST.aiOut}</div><div class="btns-row"><button class="btn btn-p" id="accept-btn">Accept & finalize</button><button class="btn" id="refine-btn">Refine tone ↗</button></div>`:""}
    ${ST.aiErr&&ST.aiCtx==="review"?`<div class="err-msg">${ST.aiErr}</div>`:""}
  </div>
  <div class="card">
    <div style="font-size:13px;font-weight:600;margin-bottom:10px">Bias mitigation checks — all active</div>
    ${BIAS_CHECKS.map(r=>`<div class="check-row"><span class="dot" style="background:${r[2]==="green"?"#1D9E75":"#EF9F27"}"></span><div class="info"><div>${r[0]}</div><div>${r[1]}</div></div></div>`).join("")}
  </div>`;
}

function bGoals(){
  const e=ST.selGoal;
  const eg=ST.goals.filter(g=>g.eid===e.id);
  return `<div class="sh"><h2>Goals & development planning</h2><p>Set goals and generate AI-powered 90-day development plans</p></div>
  <div class="emp-sel">${empBtns(e.id,"data-ge")}</div>
  <div class="card">
    <div style="font-size:13px;font-weight:600;margin-bottom:10px">Goals for ${e.name}</div>
    ${eg.length===0?`<p style="font-size:13px;color:var(--text2);padding:6px 0">No goals yet — add one below.</p>`:""}
    ${eg.map(g=>`<div class="goal-item"><div style="font-weight:500;margin-bottom:3px">${g.title}</div><div style="font-size:12px;color:var(--text2)">Due: ${g.due} · <span class="badge ${g.status==="In progress"?"bi":"bw"}">${g.status}</span></div></div>`).join("")}
    <div class="divider"></div>
    <label>Add new goal</label>
    <input type="text" id="new-goal" placeholder="E.g., Complete leadership training by Q3 2026…" value="${ST.newGoal}">
    <div class="btns-row">
      <button class="btn btn-p" id="add-goal">Add goal</button>
      <button class="btn" id="dev-plan">Generate dev plan ↗</button>
    </div>
    ${ST.aiOut&&ST.aiCtx==="goals"?`<div class="ai-out">${ST.aiOut}</div>`:""}
    ${ST.aiErr&&ST.aiCtx==="goals"?`<div class="err-msg">${ST.aiErr}</div>`:""}
  </div>`;
}

function bSettings(){
  const descs={technical:"Domain knowledge, code quality, problem-solving ability",communication:"Written and verbal clarity, documentation, presentation",collaboration:"Teamwork, cross-functional partnerships, support",initiative:"Proactiveness, ownership, independent decision-making",delivery:"On-time delivery, quality of outputs, reliability"};
  return `<div class="sh"><h2>Evaluation criteria & weights</h2><p>Standardized and applied consistently across all departments and roles</p></div>
  <div class="card">
    ${CRIT.map(c=>`<div style="padding:8px 0;border-bottom:1px solid var(--border)"><div style="display:flex;align-items:center;gap:8px"><span style="flex:1;font-weight:500;font-size:13px">${c.l}</span><span class="tag">${c.w}%</span></div><div style="font-size:12px;color:var(--text3);margin-top:3px">${descs[c.k]}</div></div>`).join("")}
    <div style="padding-top:10px;font-size:13px;color:var(--text2)">Total weight: <strong>100%</strong> · Applied to all employees equally</div>
  </div>
  <div class="card">
    <div style="font-size:13px;font-weight:600;margin-bottom:10px">Rating scale</div>
    ${[["4.5 – 5.0","Exceptional","bs"],["4.0 – 4.4","Exceeds expectations","bi"],["3.5 – 3.9","Meets expectations","bw"],["Below 3.5","Needs improvement","bd"]].map(r=>`<div style="display:flex;align-items:center;gap:14px;padding:6px 0;border-bottom:1px solid var(--border)"><span style="font-size:13px;color:var(--text2);width:90px">${r[0]}</span><span class="badge ${r[2]}">${r[1]}</span></div>`).join("")}
  </div>
  <div class="card">
    <div style="font-size:13px;font-weight:600;margin-bottom:10px">Bias mitigation — active policies</div>
    ${BIAS_CHECKS.map(r=>`<div class="check-row"><span class="dot" style="background:${r[2]==="green"?"#1D9E75":"#EF9F27"}"></span><div class="info"><div>${r[0]}</div><div>${r[1]}</div></div></div>`).join("")}
  </div>`;
}

async function callAI(prompt){
  const r=await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      model:"claude-sonnet-4-20250514",
      max_tokens:1000,
      system:"You are an expert HR performance management AI. Write fair, constructive, specific, professional assessments. Avoid biased language. Plain text only, no markdown.",
      messages:[{role:"user",content:prompt}]
    })
  });
  const d=await r.json();
  if(d.error)throw new Error(d.error.message);
  return d.content.map(b=>b.text||"").join("\n").trim();
}

function bindAll(){
  document.querySelectorAll("[data-ee]").forEach(b=>b.onclick=()=>{ST.selEval=EMPS.find(e=>e.id==b.dataset.ee);render();});
  document.querySelectorAll("[data-re]").forEach(b=>b.onclick=()=>{ST.selRev=EMPS.find(e=>e.id==b.dataset.re);ST.aiOut="";ST.aiCtx="";render();});
  document.querySelectorAll("[data-ge]").forEach(b=>b.onclick=()=>{ST.selGoal=EMPS.find(e=>e.id==b.dataset.ge);ST.aiOut="";ST.aiCtx="";render();});

  const gen=document.getElementById("gen-btn");
  if(gen)gen.onclick=async()=>{
    const e=ST.selRev;const s=SC[e.id];
    const fb=FB[e.id].map(f=>`${f.src}: "${f.txt}" (${f.stars}/5)`).join("\n");
    const bias=BF[e.id].join("; ")||"None detected";
    const prompt=`Write a comprehensive, fair performance review for ${e.name}, ${e.role} in ${e.dept}.\n\nScores (out of 5):\n${CRIT.map(c=>`- ${c.l}: ${s[c.k]} (weight ${c.w}%)`).join("\n")}\nWeighted overall: ${ws(e.id)}/5\n\n360 Feedback:\n${fb}\n\nBias flags to compensate: ${bias}\n\nStructure your review as: (1) Overall performance assessment (2) Key strengths with specific examples (3) Areas for growth (4) Recommended development actions. Keep it professional, balanced, and constructive. Plain text only.`;
    ST.gen=true;ST.aiOut="";ST.aiErr="";ST.aiCtx="review";render();
    try{ST.aiOut=await callAI(prompt);}catch(err){ST.aiErr="Could not generate review. Check API access.";}
    ST.gen=false;render();
  };

  const refine=document.getElementById("refine-btn");
  if(refine)refine.onclick=async()=>{
    if(!ST.aiOut)return;
    ST.gen=true;render();
    try{ST.aiOut=await callAI(`Refine this performance review to emphasize concrete development actions and growth opportunities. Keep the same structure.\n\n${ST.aiOut}`);}
    catch(e){ST.aiErr="Could not refine.";}
    ST.gen=false;render();
  };

  const accept=document.getElementById("accept-btn");
  if(accept)accept.onclick=()=>alert(`Review for ${ST.selRev.name} has been accepted and finalized.`);

  const fbSub=document.getElementById("fb-sub");
  if(fbSub)fbSub.onclick=()=>{
    const t=document.getElementById("fb-txt").value.trim();
    if(!t){alert("Please enter feedback text.");return;}
    alert("Feedback submitted and aggregated.");ST.fbTxt="";render();
  };

  const fbAI=document.getElementById("fb-ai");
  if(fbAI)fbAI.onclick=async()=>{
    const t=document.getElementById("fb-txt").value.trim();
    if(!t){alert("Enter feedback text first.");return;}
    ST.gen=true;ST.aiCtx="feedback";render();
    try{ST.aiOut=await callAI(`Improve this performance feedback to be more specific, constructive, and bias-free:\n\n"${t}"\n\nReturn only the improved version.`);}
    catch(e){ST.aiErr="Error improving feedback.";}
    ST.gen=false;render();
  };

  const addGoal=document.getElementById("add-goal");
  if(addGoal)addGoal.onclick=()=>{
    const t=document.getElementById("new-goal").value.trim();
    if(!t)return;
    ST.goals.push({eid:ST.selGoal.id,title:t,due:"Q4 2026",status:"Planned"});
    ST.newGoal="";render();
  };

  const devPlan=document.getElementById("dev-plan");
  if(devPlan)devPlan.onclick=async()=>{
    const e=ST.selGoal;const s=SC[e.id];
    const goals=ST.goals.filter(g=>g.eid===e.id).map(g=>g.title).join("; ")||"General professional development";
    const prompt=`Create a detailed 90-day development plan for ${e.name}, ${e.role}.\n\nLowest-scoring areas:\n- Communication: ${s.communication}/5\n- Initiative: ${s.initiative}/5\n\nCurrent goals: ${goals}\n\nInclude: specific learning resources, 30/60/90-day milestones, and measurable success criteria for each area. Plain text only.`;
    ST.gen=true;ST.aiOut="";ST.aiErr="";ST.aiCtx="goals";render();
    try{ST.aiOut=await callAI(prompt);}catch(err){ST.aiErr="Error generating plan.";}
    ST.gen=false;render();
  };

  const ng=document.getElementById("new-goal");if(ng)ng.oninput=e=>{ST.newGoal=e.target.value;};
  const fbt=document.getElementById("fb-txt");if(fbt)fbt.oninput=e=>{ST.fbTxt=e.target.value;};
  const fbs=document.getElementById("fb-src");if(fbs)fbs.onchange=e=>{ST.fbSrc=e.target.value;};
  const fbe=document.getElementById("fb-emp");if(fbe)fbe.onchange=e=>{ST.fbEid=parseInt(e.target.value);};
}

render();
</script>
